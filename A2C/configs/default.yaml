# A2C 默认超参数配置

device: auto   # auto / cuda / cpu

agent:
  state_dim: 14
  action_dim: 36
  hidden_dims: [256, 256]
  lr: 7.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5

training:
  num_episodes: 2000
  max_steps: 500
  n_steps: 10          # 每隔 N 步执行一次 A2C 更新
  val_interval: 100    # 每 N 个 episode 做一次验证
  val_episodes: 5      # 验证时跑 N 个 episode 取平均
  test_episodes: 10    # 最终测试跑 N 个 episode 取平均
  log_interval: 10
  save_interval: 200

env:
  num_nodes: 100
  step_batch: 10
  reward_weights:
    throughput: 0.3
    latency: 0.3
    utilization: 0.2
    cost: 0.1
    sla: 0.1
